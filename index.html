<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/toolyy-logo.png" />
    <meta property="og:image" content="/toolyy-logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="/toolyy-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="description" content="Access clean, fast, privacy-first web utilities. Convert formats, compress assets, and format data instantly in your browser with zero server uploads." />
    <title>Toolyy | Minimalist Developer & Consumer Utility Hub</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="936c635b-6c6b-4370-b582-4d33070195be"></script>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap"
      />
    </noscript>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Sora',system-ui,sans-serif;background-color:#FAFAFA;background-image:radial-gradient(rgba(148,163,184,.22) 1px,transparent 1px);background-size:28px 28px;min-height:100vh;-webkit-font-smoothing:antialiased}
      .sh-header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.4);box-shadow:0 1px 2px rgba(0,0,0,.04)}
      .sh-header-inner{max-width:80rem;margin:0 auto;padding:0 1rem;height:4rem;display:flex;align-items:center;justify-content:space-between}
      .sh-logo{display:flex;align-items:center;gap:.375rem;text-decoration:none}
      .sh-logo-icon{height:2rem;width:auto}
      .sh-logo-text{font-weight:800;color:#111827;letter-spacing:-.025em}
      .sh-nav{display:flex;align-items:center;gap:.25rem;font-size:.875rem;font-weight:500}
      .sh-nav a{padding:.375rem .75rem;border-radius:.75rem;color:#6b7280;text-decoration:none}
      .sh-hero{max-width:72rem;margin:0 auto;padding:4rem 1rem 3rem}
      .sh-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.375rem .875rem;border-radius:9999px;background:rgba(79,70,229,.1);color:#4F46E5;font-size:.75rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-bottom:1.5rem;opacity:0;animation:sh-fade-up .6s cubic-bezier(.22,1,.36,1) forwards}
      .sh-h1{font-size:clamp(3rem,8vw,4.5rem);font-weight:900;letter-spacing:-.025em;color:#111827;line-height:1.04;opacity:0;animation:sh-fade-up .6s cubic-bezier(.22,1,.36,1) .08s forwards}
      .sh-h1 .sh-brand{color:#4F46E5}
      .sh-subtitle{margin-top:1.25rem;font-size:1.125rem;color:#9ca3af;font-weight:500;max-width:24rem;line-height:1.6;opacity:0;animation:sh-fade-up .6s cubic-bezier(.22,1,.36,1) .16s forwards}
      .sh-pills{display:flex;flex-wrap:wrap;gap:.625rem;margin-top:1.75rem;opacity:0;animation:sh-fade-up .6s cubic-bezier(.22,1,.36,1) .22s forwards}
      .sh-pill{display:inline-flex;align-items:center;gap:.375rem;padding:.375rem .875rem;border-radius:9999px;background:rgba(255,255,255,.8);border:1px solid #f3f4f6;font-size:.75rem;font-weight:700;color:#4b5563;box-shadow:0 1px 2px rgba(0,0,0,.05)}
      .sh-pill svg{width:.875rem;height:.875rem;color:#4F46E5}
      .sh-cta{margin-top:2rem;display:flex;align-items:center;gap:.75rem;opacity:0;animation:sh-fade-up .6s cubic-bezier(.22,1,.36,1) .28s forwards}
      .sh-cta-btn{padding:.875rem 1.75rem;background:#4F46E5;color:#fff;font-weight:800;border-radius:1rem;border:none;font-size:.875rem;box-shadow:0 10px 15px -3px rgba(79,70,229,.3);cursor:pointer}
      .sh-cta-hint{font-size:.75rem;color:#d1d5db;font-weight:500}
      @keyframes sh-fade-up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="sh-header">
        <div class="sh-header-inner">
          <a class="sh-logo" href="/">
            <img class="sh-logo-icon" src="/toolyy-logo.png" alt="Toolyy" width="55" height="32">
            <span class="sh-logo-text">Toolyy</span>
          </a>
          <nav class="sh-nav">
            <a href="/">Home</a>
            <a href="/about">About</a>
          </nav>
        </div>
      </div>
      <section class="sh-hero">
        <span class="sh-badge">Toolyy Browser Toolkit</span>
        <h1 class="sh-h1">
          File magic,<br><span class="sh-brand">no friction.</span>
        </h1>
        <p class="sh-subtitle">Powerful browser utilities for PDFs, images and more. Your files never leave your device.</p>
        <div class="sh-pills">
          <span class="sh-pill"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>No Upload</span>
          <span class="sh-pill"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>Instant</span>
          <span class="sh-pill"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.77 4 4 0 0 1 0 6.76 4 4 0 0 1-4.78 4.77 4 4 0 0 1-6.74 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>100% Free</span>
        </div>
        <div class="sh-cta">
          <button class="sh-cta-btn">Browse Files</button>
          <span class="sh-cta-hint">or drag one over</span>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
